name: rtlreviewbot review (reusable)

# Reusable workflow invoked by consumer repos via `uses:`. The consumer
# shim catches GitHub events and forwards normalized inputs to this file.

on:
  workflow_call:
    inputs:
      event_name:
        description: 'GitHub event that triggered the consumer shim (issue_comment, pull_request)'
        required: true
        type: string
      event_action:
        description: 'Event-specific action (e.g. created, review_requested, closed)'
        required: false
        type: string
        default: ''
      repo:
        description: 'Consumer repo in owner/name form (e.g. github.repository)'
        required: true
        type: string
      pr_number:
        description: 'Pull request number'
        required: true
        type: number
      actor:
        description: 'Login of the user that triggered the event'
        required: true
        type: string
      comment_body:
        description: 'Body of the triggering comment, for issue_comment events'
        required: false
        type: string
        default: ''
      comment_id:
        description: 'Numeric id of the triggering comment, for issue_comment events. Used to react with a 👍 on success.'
        required: false
        type: string
        default: ''
      installation_id:
        description: 'GitHub App installation ID for the consumer repo. Find it on the App settings → Install App page.'
        required: true
        type: number
      ref:
        description: 'rtlreviewbot ref (tag/sha) to check out. Pin to a release tag in production.'
        required: false
        type: string
        default: 'main'
    secrets:
      app_id:
        description: 'rtlreviewbot GitHub App ID (org secret GATEWAY_APP_ID).'
        required: true
      private_key:
        description: 'rtlreviewbot GitHub App private key, PEM contents (org secret GATEWAY_PRIVATE_KEY).'
        required: true
      anthropic_api_key:
        description: 'Anthropic API key for the /code-review skill (org secret ANTHROPIC_API_KEY). Either this or claude_code_oauth_token must be set; if both are set, API is tried first and OAuth is the fallback.'
        required: false
      claude_code_oauth_token:
        description: 'Claude Code OAuth token (org secret CLAUDE_CODE_OAUTH_TOKEN). Generate locally via `claude setup-token` after `claude /login`. Bills against the signed-in Claude.ai subscription rather than per-token API. Either this or anthropic_api_key must be set.'
        required: false

permissions:
  # The reusable workflow itself needs no special token permissions — every
  # GitHub call is made via the App installation token minted at runtime.
  contents: read

jobs:
  review:
    name: Run rtlreviewbot
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout rtlreviewbot
        uses: actions/checkout@v4
        with:
          repository: Ride-The-Lightning/rtlreviewbot
          ref: ${{ inputs.ref }}
          path: rtlreviewbot

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run rtlreviewbot
        env:
          GATEWAY_APP_ID: ${{ secrets.app_id }}
          GATEWAY_PRIVATE_KEY: ${{ secrets.private_key }}
          GATEWAY_INSTALLATION_ID: ${{ inputs.installation_id }}
          # Both Claude auth env vars are passed through. handle-review.sh
          # detects which are present and tries them in order: API first,
          # OAuth fallback. At least one must be set or the script errors
          # out cleanly.
          ANTHROPIC_API_KEY: ${{ secrets.anthropic_api_key }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.claude_code_oauth_token }}
        run: |
          rtlreviewbot/scripts/run-review.sh \
            --event-name   "${{ inputs.event_name }}" \
            --event-action "${{ inputs.event_action }}" \
            --repo         "${{ inputs.repo }}" \
            --pr           "${{ inputs.pr_number }}" \
            --actor        "${{ inputs.actor }}" \
            --comment-body "${{ inputs.comment_body }}" \
            --comment-id   "${{ inputs.comment_id }}"
