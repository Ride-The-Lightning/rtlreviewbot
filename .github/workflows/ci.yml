name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: |
          # -S warning filters out info- and style-level findings. The most
          # common one we hit is SC1091 ("not following") on source-only
          # files under scripts/lib/, which is a known shellcheck quirk
          # with cross-script analysis — the libs are real and on disk and
          # work at runtime, shellcheck just can't always resolve the
          # relative path. Real warnings and errors still fail the build.
          find scripts -name '*.sh' -print0 | xargs -0 shellcheck -S warning

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install actionlint
        run: |
          bash <(curl -sSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Run actionlint
        run: actionlint -color

  bats:
    name: unit tests (bats)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats-core (pinned)
        run: |
          git clone --depth 1 --branch v1.10.0 https://github.com/bats-core/bats-core.git /tmp/bats-core
          sudo /tmp/bats-core/install.sh /usr/local

      - name: Run unit tests
        run: bats tests/unit/
